name: ML CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt anywidget ipywidgets
          pip install flake8 pytest


      # - name: Lint with flake8
      #   run: flake8 . --ignore=E501,F401,W391,W293,E221,W503,E241,E401

      - name: Run orchestrated training and print Evaluation Matrix
        run: python src/orchestration.py

      - name: Run DeepChecks data integrity
        run: python tests/ml_data_validation.py

      - name: Run tests
        run: python -m pytest tests/

      - name: Validate data
        run: python src/validate.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t mlops-app .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Image
        run: |
          docker tag mlops-app ${{ secrets.DOCKER_USER }}/mlops-app
          docker push ${{ secrets.DOCKER_USER }}/mlops-app